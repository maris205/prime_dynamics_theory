[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "rh78-two-corridor-stage-a1-composition"
version = "0.1.0"
description = "Conditional Stage A1/A4 composition through block or effective-rank corridors"
requires-python = ">=3.10"
dependencies = ["matplotlib>=3.7", "pytest>=7.0", "python-flint>=0.6"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
pythonpath = ["src"]
