[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "two-pole-hilbert-schmidt-hardy"
version = "0.1.0"
description = "Two-pole Hardy energies and directional Stein certificates"
requires-python = ">=3.10"
dependencies = ["numpy", "scipy", "matplotlib"]

[tool.pytest.ini_options]
pythonpath = ["src", "."]
testpaths = ["tests"]
