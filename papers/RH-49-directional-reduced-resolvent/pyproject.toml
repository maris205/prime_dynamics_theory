[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "directional-reduced-resolvent"
version = "0.1.0"
description = "Residue deflation and quarter-power stable-rank transfer"
requires-python = ">=3.10"
dependencies = ["numpy", "scipy", "matplotlib"]

[tool.pytest.ini_options]
pythonpath = ["src", "."]
testpaths = ["tests"]
