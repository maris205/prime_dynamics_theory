[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "factor-aware-intrinsic-identification"
version = "0.1.0"
description = "Factor-aware sparse-to-full transfer for intrinsic Riesz identification"
requires-python = ">=3.10"
dependencies = ["numpy", "scipy", "matplotlib", "python-flint"]

[tool.pytest.ini_options]
pythonpath = ["src", "."]
testpaths = ["tests"]
