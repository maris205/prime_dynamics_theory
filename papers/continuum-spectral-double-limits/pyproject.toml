[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "continuum-spectral-double-limits"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = ["numpy>=2.0", "scipy>=1.14", "matplotlib>=3.9"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
