[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "sparse-threshold-inertia"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
  "mpmath>=1.3",
  "numpy>=1.24",
  "python-flint>=0.6",
  "scipy>=1.10",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.setuptools.packages.find]
where = ["src"]
