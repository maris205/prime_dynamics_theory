[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "growing-horizon-hard-space-barrier"
version = "0.1.0"
description = "Growing-horizon hard-space barriers and directional overlap budgets"
requires-python = ">=3.10"
dependencies = ["numpy", "matplotlib", "python-flint"]

[tool.pytest.ini_options]
pythonpath = ["src", "."]
testpaths = ["tests"]

