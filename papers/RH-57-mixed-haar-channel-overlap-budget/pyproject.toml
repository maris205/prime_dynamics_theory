[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "haar-overlap"
version = "0.1.0"
description = "Riesz-block Hardy overlap budgets for RH-57"
requires-python = ">=3.11"
dependencies = [
  "numpy>=2.0",
  "scipy>=1.14",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
