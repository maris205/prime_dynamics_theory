[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "strong-weak-riesz-cutoff-transfer"
version = "0.1.0"
description = "Strong--weak adaptive cutoff transfer for intrinsic Riesz factors"
requires-python = ">=3.10"
dependencies = ["numpy", "scipy", "matplotlib", "python-flint"]

[tool.pytest.ini_options]
pythonpath = ["src", "."]
testpaths = ["tests"]
