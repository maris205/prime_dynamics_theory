[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "rh61-directional-horizon-scaling"
version = "0.1.0"
description = "Horizon envelopes and slow-mode barriers for Stein tails"
requires-python = ">=3.10"
dependencies = [
  "numpy>=1.24",
  "matplotlib>=3.7",
  "pytest>=7.0",
  "python-flint>=0.6",
]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
pythonpath = ["src"]
