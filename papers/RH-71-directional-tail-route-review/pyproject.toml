[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "rh71-directional-tail-route-review"
version = "0.1.0"
description = "Certificate-stack synthesis and route review after RH-70"
requires-python = ">=3.10"
dependencies = [
  "numpy>=1.24",
  "matplotlib>=3.7",
  "pytest>=7.0",
  "python-flint>=0.6",
]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
pythonpath = ["src"]
