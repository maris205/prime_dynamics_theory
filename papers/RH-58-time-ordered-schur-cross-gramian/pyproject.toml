[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "schur-fusion"
version = "0.1.0"
description = "Time-ordered Schur cross-Gramians for RH-58"
requires-python = ">=3.11"
dependencies = [
  "numpy>=2.0",
  "scipy>=1.14",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
