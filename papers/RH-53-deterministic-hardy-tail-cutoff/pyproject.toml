[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "deterministic-hardy-tail-cutoff"
version = "0.1.0"
description = "Deterministic Hardy tails and adaptive Gaussian cutoff transfer"
requires-python = ">=3.10"
dependencies = ["numpy", "scipy", "matplotlib", "python-flint"]

[tool.pytest.ini_options]
pythonpath = ["src", "."]
testpaths = ["tests"]
