[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "parity-renormalized-long-cycles"
version = "0.1.0"
description = "Long-cycle and parity-renormalized determinants for a noisy quadratic map"
requires-python = ">=3.10"
dependencies = [
  "numpy>=1.24",
  "scipy>=1.10",
  "matplotlib>=3.7",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
