[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "flag-stein"
version = "0.1.0"
description = "Flag-adapted Schur--Stein metrics for RH-59"
requires-python = ">=3.11"
dependencies = [
  "numpy>=2.0",
  "scipy>=1.14",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
