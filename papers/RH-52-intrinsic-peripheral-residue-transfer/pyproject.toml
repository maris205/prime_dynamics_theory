[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "intrinsic-peripheral-residue-transfer"
version = "0.1.0"
description = "Weak finite-factor bounds and intrinsic peripheral residue transfer"
requires-python = ">=3.10"
dependencies = ["numpy", "scipy", "matplotlib"]

[tool.pytest.ini_options]
pythonpath = ["src", "."]
testpaths = ["tests"]
