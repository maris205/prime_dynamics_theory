[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "cyclic-rank-growing-horizon-stein"
version = "0.1.0"
description = "Cyclic-rank obstructions and growing-horizon Stein certificates"
requires-python = ">=3.10"
dependencies = ["numpy", "scipy", "matplotlib"]

[tool.pytest.ini_options]
pythonpath = ["src", "."]
testpaths = ["tests"]
