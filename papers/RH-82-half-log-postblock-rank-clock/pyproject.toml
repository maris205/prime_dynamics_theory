[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "rh82-half-log-postblock-rank-clock"
version = "0.1.0"
description = "Exponential excess-rank tails and the half-log postblock clock"
requires-python = ">=3.10"
dependencies = ["matplotlib>=3.7", "numpy>=1.24", "pytest>=7.0", "python-flint>=0.6", "scipy>=1.10"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
pythonpath = ["src"]

