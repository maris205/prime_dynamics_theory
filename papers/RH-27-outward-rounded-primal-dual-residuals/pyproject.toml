[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "outward-rounded-primal-dual-residuals"
version = "0.1.0"
description = "Outward-rounded stored-matrix residual enclosures for primal-dual Feshbach certificates"
requires-python = ">=3.10"
dependencies = [
  "matplotlib>=3.7",
  "numpy>=1.24",
  "scipy>=1.10",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
