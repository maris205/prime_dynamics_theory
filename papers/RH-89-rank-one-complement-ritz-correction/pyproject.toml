[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "rh89-rank-one-complement-ritz-correction"
version = "0.1.0"
description = "Rank-one complement enrichment and compressed Ritz packet correction"
requires-python = ">=3.10"
dependencies = ["matplotlib>=3.7", "numpy>=1.24", "pytest>=7.0", "python-flint>=0.6"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
pythonpath = ["src"]
