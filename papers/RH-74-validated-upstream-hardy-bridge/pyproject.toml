[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "rh74-validated-upstream-hardy-bridge"
version = "0.1.0"
description = "Robust blockwise Hardy bridge from upstream factor balls to frozen production systems"
requires-python = ">=3.10"
dependencies = [
  "numpy>=1.24",
  "scipy>=1.10",
  "matplotlib>=3.7",
  "pytest>=7.0",
  "python-flint>=0.6",
]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
pythonpath = ["src"]
