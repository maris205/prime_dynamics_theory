[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "temporal-spectrum"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = ["numpy>=2.0", "scipy>=1.13", "matplotlib>=3.8"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.setuptools.packages.find]
where = ["src"]
