[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "rh70-frozen-production-block-hardy-audit"
version = "0.1.0"
description = "Outward-rounded block Hardy certificates on frozen production matrices"
requires-python = ">=3.10"
dependencies = [
  "numpy>=1.24",
  "scipy>=1.10",
  "matplotlib>=3.7",
  "pytest>=7.0",
  "python-flint>=0.6",
]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
pythonpath = ["src"]
